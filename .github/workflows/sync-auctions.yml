name: Sync Auctions

on:
  schedule:
    - cron: '0 3 * * *'    # 3 AM UTC daily
    - cron: '0 16 * * *'   # 4 PM UTC daily
    - cron: '0 19 * * *'   # 7 PM UTC daily
  workflow_dispatch:

concurrency:
  group: sync-auctions
  cancel-in-progress: false

env:
  PROJECT_SUPABASE_URL: https://zzigibfdsitbvczozlsg.supabase.co
  PROJECT_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6aWdpYmZkc2l0YnZjem96bHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwNDA3NTIsImV4cCI6MjA4NTYxNjc1Mn0.BRewTYU_AwowwuupwH9cNGBKqjtb01RelkLlqLunCmM

jobs:
  check-db-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check if cleanup is still running
        run: |
          HEALTH_URL="${{ env.PROJECT_SUPABASE_URL }}/rest/v1/auctions?select=domain_name&limit=1"
          HEADERS=$(mktemp)
          BODY=$(mktemp)
          STATUS=""
          CONTENT_RANGE=""
          COUNT=""
          CURL_EXIT=0

          for attempt in 1 2 3; do
            : > "$HEADERS"
            : > "$BODY"

            if STATUS=$(curl -sS -o "$BODY" -D "$HEADERS" -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 20 \
              "$HEALTH_URL" \
              -H "apikey: ${{ env.PROJECT_SUPABASE_ANON_KEY }}" \
              -H "Authorization: Bearer ${{ env.PROJECT_SUPABASE_ANON_KEY }}" \
              -H "Prefer: count=planned" \
              -H "Range: 0-0"); then
              CURL_EXIT=0
            else
              CURL_EXIT=$?
            fi

            CONTENT_RANGE=$(grep -i '^content-range:' "$HEADERS" | tail -n 1 | tr -d '\r')
            COUNT=$(echo "$CONTENT_RANGE" | sed -En 's#.*\/([0-9]+)$#\1#p')

            if [ "$CURL_EXIT" -eq 0 ] && [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
              break
            fi

            echo "⚠️ Health probe attempt $attempt failed (curl exit: $CURL_EXIT, status: ${STATUS:-none})"
            if [ -s "$BODY" ]; then
              sed -n '1,5p' "$BODY"
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 5
            fi
          done

          echo "Health status: ${STATUS:-missing}"
          echo "Estimated auction count header: ${CONTENT_RANGE:-missing}"

          rm -f "$HEADERS" "$BODY"

          if [ "$CURL_EXIT" -eq 0 ] && [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            if [[ "$COUNT" =~ ^[0-9]+$ ]] && [ "$COUNT" -gt 5000000 ]; then
              echo "❌ Database health check failed, stopping sync"
              exit 1
            fi

            echo "✅ Database healthy, proceeding with sync"
            exit 0
          fi

          echo "⚠️ Health probe unavailable, continuing with sequential sync chain to avoid false skips"

  validate-sync-config:
    needs: [check-db-health]
    runs-on: ubuntu-latest
    steps:
      - name: Validate required GitHub secrets
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          missing=0

          if [ -z "$SYNC_SECRET" ]; then
            echo "::error::Missing GitHub secret: SYNC_SECRET"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

          echo "✅ Required sync secrets are present"

  sync-large-inventory:
    name: sync-godaddy
    needs: [validate-sync-config]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @supabase/supabase-js node-fetch
      - name: Run large inventory sync
        env:
          SUPABASE_URL: ${{ env.PROJECT_SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/sync-large-inventory.cjs

  sync-namecheap:
    needs: [sync-large-inventory]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @supabase/supabase-js node-fetch
      - name: Run Namecheap sync
        env:
          SUPABASE_URL: ${{ env.PROJECT_SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/sync-namecheap-inventory.cjs

  sync-sedo:
    needs: [sync-namecheap]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @supabase/supabase-js node-fetch
      - name: Run Sedo auction sync
        env:
          SUPABASE_URL: ${{ env.PROJECT_SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/sync-sedo-inventory.cjs
