name: Sync Auctions

on:
  workflow_dispatch:

concurrency:
  group: sync-auctions
  cancel-in-progress: false

jobs:
  workflow-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Sync workflow temporarily disabled
        run: |
          echo "⏸️ All GitHub sync jobs are disabled during database recovery."
          echo "Use direct backend cleanup only until auth is stable again."
