name: Sync Auctions

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: sync-auctions
  cancel-in-progress: false

jobs:
  pre-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      healthy: ${{ steps.cleanup.outputs.healthy }}
      auction_count_estimate: ${{ steps.cleanup.outputs.auction_count_estimate }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Clean up expired auctions
        id: cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/cleanup-expired-auctions.cjs

  sync-namecheap:
    needs: pre-cleanup
    if: needs.pre-cleanup.outputs.healthy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install @supabase/supabase-js node-fetch
      - name: Run Namecheap sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/sync-namecheap-inventory.cjs

  sync-large-inventory:
    needs: pre-cleanup
    if: needs.pre-cleanup.outputs.healthy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install @supabase/supabase-js node-fetch adm-zip
      - name: Run large inventory sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node .github/scripts/sync-large-inventory.cjs
